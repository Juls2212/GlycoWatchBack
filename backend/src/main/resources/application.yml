spring:
  application:
    name: glycowatch-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:glycowatch}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:22Diciembre2006}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

server:
  port: ${SERVER_PORT:8081}

jwt:
  secret: ${JWT_SECRET:replace-with-a-very-long-secret-key-at-least-32-characters}
  access-token-expiration-minutes: ${JWT_ACCESS_EXPIRATION_MINUTES:15}
  refresh-token-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}
  issuer: ${JWT_ISSUER:glycowatch-backend}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info
